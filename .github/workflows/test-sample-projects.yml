name: Test Sample Projects

on:
  workflow_call:
    secrets:
      GFP_API_KEY:
        required: false

env:
  GFP_API_KEY: ${{ secrets.GFP_API_KEY }}

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      project-dirs: ${{ steps.find.outputs.dirs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: find
        run: |
          dirs=$(find . -maxdepth 3 -name 'pyproject.toml' \
            -path '*--sample-projects/*' ! -path '*/.venv/*' \
            | sed 's|^\./||; s|/pyproject.toml||' \
            | sort \
            | jq -Rcs '[split("\n")[] | select(. != "")]')
          echo "dirs=$dirs" >> "$GITHUB_OUTPUT"

  test:
    name: Test ${{ matrix.project-dir }}
    needs: discover
    if: needs.discover.outputs.project-dirs != '' && needs.discover.outputs.project-dirs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project-dir: ${{ fromJSON(needs.discover.outputs.project-dirs) }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-test-${{ matrix.project-dir }}
      cancel-in-progress: true
    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.project-dir }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
      - name: Configure gfp
        run: uv run --no-project --with gdsfactoryplus gfp configure --api-key ${{ secrets.GFP_API_KEY }} --uv
      - name: Prepare PDK variant
        run: |
          python3 << 'PYEOF'
          import tomllib, subprocess, os, re
          ws = os.environ["GITHUB_WORKSPACE"]
          with open(os.path.join(ws, "pyproject.toml"), "rb") as f:
              root_name = tomllib.load(f)["project"]["name"]
          with open("pyproject.toml", "rb") as f:
              deps = tomllib.load(f)["project"]["dependencies"]
          for d in deps:
              dep_name = re.split(r"[\[~><=!;@\s]", d)[0]
              if dep_name != root_name and dep_name.startswith(root_name + "-"):
                  variant = dep_name[len(root_name) + 1:]
                  makefile = os.path.join(ws, "Makefile")
                  if os.path.isfile(makefile):
                      r = subprocess.run(["make", "-C", ws, "-n", f"prepare-{variant}"], capture_output=True)
                      if r.returncode == 0:
                          print(f"Preparing variant: {variant}")
                          subprocess.check_call(["make", "-C", ws, f"prepare-{variant}"])
                  break
          PYEOF
      - name: Install current PDK
        run: |
          uv venv
          uv pip install -e "$GITHUB_WORKSPACE"
      - name: Install dependencies
        run: uv pip install -e "."
      - name: Test
        run: uv run --no-sync gfp test

  notebooks:
    name: Notebooks ${{ matrix.project-dir }}
    needs: discover
    if: needs.discover.outputs.project-dirs != '' && needs.discover.outputs.project-dirs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project-dir: ${{ fromJSON(needs.discover.outputs.project-dirs) }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-notebooks-${{ matrix.project-dir }}
      cancel-in-progress: true
    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.project-dir }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
      - name: Configure gfp
        run: uv run --no-project --with gdsfactoryplus gfp configure --api-key ${{ secrets.GFP_API_KEY }} --uv
      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libglu1-mesa libgl1
      - name: Prepare PDK variant
        run: |
          python3 << 'PYEOF'
          import tomllib, subprocess, os, re
          ws = os.environ["GITHUB_WORKSPACE"]
          with open(os.path.join(ws, "pyproject.toml"), "rb") as f:
              root_name = tomllib.load(f)["project"]["name"]
          with open("pyproject.toml", "rb") as f:
              deps = tomllib.load(f)["project"]["dependencies"]
          for d in deps:
              dep_name = re.split(r"[\[~><=!;@\s]", d)[0]
              if dep_name != root_name and dep_name.startswith(root_name + "-"):
                  variant = dep_name[len(root_name) + 1:]
                  makefile = os.path.join(ws, "Makefile")
                  if os.path.isfile(makefile):
                      r = subprocess.run(["make", "-C", ws, "-n", f"prepare-{variant}"], capture_output=True)
                      if r.returncode == 0:
                          print(f"Preparing variant: {variant}")
                          subprocess.check_call(["make", "-C", ws, f"prepare-{variant}"])
                  break
          PYEOF
      - name: Install current PDK
        run: |
          uv venv
          uv pip install -e "$GITHUB_WORKSPACE"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Install notebook tools
        run: uv pip install nbconvert ipykernel
      - name: Execute notebooks
        env:
          RAY_ENABLE_UV_RUN_RUNTIME_ENV: "0"
        run: |
          shopt -s globstar nullglob
          SKIP_PATTERNS="hfss_|hfss-|matlab_|matlab-"
          notebooks=(**/*.ipynb)
          if [ ${#notebooks[@]} -eq 0 ]; then
            echo "No notebooks found"
            exit 0
          fi
          echo "Found ${#notebooks[@]} notebook(s)"
          for notebook in "${notebooks[@]}"; do
            if echo "$notebook" | grep -qE "$SKIP_PATTERNS"; then
              echo "Skipping $notebook (proprietary tools)"
              continue
            fi
            echo "Executing $notebook"
            uv run --no-sync jupyter nbconvert --to notebook --execute "$notebook" \
              --output-dir /tmp --ExecutePreprocessor.timeout=600
          done

