name: Pre-commit

on:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-pre_commit
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
    - name: Fetch canonical pre-commit config
      run: |
        curl -fSL https://raw.githubusercontent.com/doplaydo/pdk-ci-workflow-public/main/templates/.pre-commit-config.yaml \
          -o .pre-commit-config.yaml
    - name: Run pre-commit (no cache — rev uses mutable main branch)
      run: |
        pip install pre-commit
        pre-commit run --all-files
