# =============================================================================
# PDK structure validation hooks
# =============================================================================

- id: check-required-files
  name: Check required PDK files exist
  entry: check_required_files
  language: python
  always_run: true
  pass_filenames: false
  description: >
    Verifies required files (README.md, LICENSE, Makefile, pyproject.toml,
    .pre-commit-config.yaml, tests/, workflows) exist at repo root.

- id: check-pyproject-sections
  name: Validate pyproject.toml sections
  entry: check_pyproject_sections
  language: python
  always_run: true
  pass_filenames: false
  description: >
    Deep validation of pyproject.toml for all required PDK configuration
    sections: build-system, project fields, ruff, codespell, pytest, tbump,
    mypy, towncrier, and package-data.

- id: check-package-init
  name: Validate PDK package __init__.py
  entry: check_package_init
  language: python
  always_run: true
  pass_filenames: false
  description: >
    Checks that the top-level package __init__.py defines __version__ as a
    string literal and __all__ for public API exports.

- id: check-cells-structure
  name: Validate PDK cell functions
  entry: check_cells_structure
  language: python
  always_run: true
  pass_filenames: false
  description: >
    Checks @gf.cell decorators on component functions, Google-style
    docstrings with Args sections, and cells/__init__.py re-exports.

- id: check-tech-structure
  name: Validate PDK tech.py
  entry: check_tech_structure
  language: python
  always_run: true
  pass_filenames: false
  description: >
    Checks that tech.py defines LAYER, LAYER_STACK, LAYER_VIEWS, and
    cross_sections. Optionally cross-checks with layers.yaml.

- id: check-pdk-object
  name: Validate Pdk() constructor
  entry: check_pdk_object
  language: python
  always_run: true
  pass_filenames: false
  description: >
    Checks that Pdk() is constructed with required keyword arguments
    (name, cells, layers, cross_sections) and uses get_cells().

- id: check-test-structure
  name: Validate test directory structure
  entry: check_test_structure
  language: python
  always_run: true
  pass_filenames: false
  description: >
    Checks tests/ directory exists with test files, GDS reference
    directories, difftest() calls, and data_regression usage.

- id: check-makefile-targets
  name: Validate Makefile targets
  entry: check_makefile_targets
  language: python
  always_run: true
  pass_filenames: false
  description: >
    Checks Makefile has required targets (install, test) and recommended
    targets (docs, build, test-force, update-pre).

- id: check-workflows
  name: Validate GitHub Actions workflows
  entry: check_workflows
  language: python
  always_run: true
  pass_filenames: false
  description: >
    Checks .github/workflows/ has test_code.yml with pre-commit and
    test jobs. Recommends release.yml for published PDKs.

- id: check-multi-band
  name: Validate multi-band PDK consistency
  entry: check_multi_band
  language: python
  always_run: true
  pass_filenames: false
  description: >
    For multi-band PDKs, checks each band has consistent module sets
    (cells, tech, models), corresponding tests, and shared layers.

- id: check-no-raw-layers
  name: No raw layer tuples in cells
  entry: check_no_raw_layers
  language: python
  always_run: true
  pass_filenames: false
  description: >
    Flags (int, int) tuples in cell files that should use LAYER.XXX
    constants instead. Allows raw tuples in tech.py and layers.py.

- id: check-no-main-in-cells
  name: No __main__ blocks in cells
  entry: check_no_main_in_cells
  language: python
  always_run: true
  pass_filenames: false
  description: >
    Flags if __name__ == "__main__" blocks in cell files. Debug/test
    code should not be committed in cell modules.

- id: check-precommit-config
  name: Validate .pre-commit-config.yaml hooks
  entry: check_precommit_config
  language: python
  always_run: true
  pass_filenames: false
  description: >
    Checks .pre-commit-config.yaml includes required hooks
    (end-of-file-fixer, trailing-whitespace, ruff or ruff-lint, ruff-format)
    and recommended hooks (nbstripout, codespell).

- id: check-version-sync
  name: Verify version consistency
  entry: check_version_sync
  language: python
  always_run: true
  pass_filenames: false
  description: >
    Checks version strings match across pyproject.toml [project].version,
    [tool.tbump.version].current, __init__.py __version__, and README.md.

- id: check-template-drift
  name: Check .github template drift
  entry: check_template_drift
  language: python
  always_run: true
  pass_filenames: false
  description: >
    Enforces PDK repo .github/ files match the canonical templates in
    pdk-ci-workflow. Ruff-style auto-fix: on drift, rewrites local file
    from template and exits 1; second run exits 0.

- id: check-hook-freshness
  name: Check pre-commit hook cache freshness
  entry: check_hook_freshness
  language: python
  always_run: true
  pass_filenames: false
  description: >
    Detects a stale local pre-commit cache: compares the commit this
    installed hook checkout was cloned from against the current tip of
    this hook repo's main branch and fails if they differ. Warns
    (doesn't fail) when offline or the check can't be determined.

# =============================================================================
# Third-party wrapper hooks
#
# These wrap commonly-used third-party tools so PDK repos only need to
# reference pdk-ci-workflow as a single pre-commit repo. Versions are
# controlled centrally via additional_dependencies.
# =============================================================================

- id: trailing-whitespace
  name: Trim trailing whitespace
  entry: trailing-whitespace-fixer
  language: python
  types: [text]
  additional_dependencies: ['pre-commit-hooks==5.0.0']
  description: >
    Removes trailing whitespace from text files.

- id: end-of-file-fixer
  name: Fix end of files
  entry: end-of-file-fixer
  language: python
  types: [text]
  additional_dependencies: ['pre-commit-hooks==5.0.0']
  description: >
    Ensures files end with a single newline.

- id: check-yaml
  name: Check YAML syntax
  entry: check-yaml
  language: python
  types: [yaml]
  additional_dependencies: ['pre-commit-hooks==5.0.0']
  description: >
    Validates YAML file syntax. PDK repos can override exclude patterns
    for PDK-specific data files.

- id: check-added-large-files
  name: Check for large files
  entry: check-added-large-files
  language: python
  additional_dependencies: ['pre-commit-hooks==5.0.0']
  description: >
    Prevents giant files from being committed.

- id: check-toml
  name: Check TOML syntax
  entry: check-toml
  language: python
  types: [toml]
  additional_dependencies: ['pre-commit-hooks==5.0.0']
  description: >
    Validates TOML file syntax.

- id: ruff-lint
  name: Ruff lint
  entry: ruff check --fix --exit-non-zero-on-fix
  language: python
  types_or: [python, pyi]
  require_serial: true
  additional_dependencies: ['ruff==0.12.0']
  description: >
    Runs ruff linter with auto-fix. Uses pyproject.toml for configuration.

- id: ruff-format
  name: Ruff format
  entry: ruff format
  language: python
  types_or: [python, pyi]
  require_serial: true
  additional_dependencies: ['ruff==0.12.0']
  description: >
    Runs ruff formatter. Uses pyproject.toml for configuration.

- id: nbstripout
  name: Strip notebook output
  entry: nbstripout
  language: python
  types: [jupyter]
  additional_dependencies: ['nbstripout==0.8.1']
  description: >
    Strips output cells from Jupyter notebooks before commit.

- id: codespell
  name: Check spelling
  entry: codespell
  language: python
  types: [text]
  additional_dependencies: ['codespell==2.4.1']
  description: >
    Checks for common misspellings in text files.

- id: pretty-format-toml
  name: Format TOML files
  entry: pretty-format-toml --autofix
  language: python
  types: [toml]
  exclude: ^uv\.lock$
  additional_dependencies: ['language-formatters-pre-commit-hooks==2.16.0']
  description: >
    Auto-formats TOML files. Excludes uv.lock which should not be reformatted.
